<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Inter, -apple-system, sans-serif;
    font-size: 12px;
    background: #1e1e1e;
    color: #e0e0e0;
    padding: 16px;
    height: 100%;
  }

  h1 { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .subtitle { color: #888; font-size: 11px; margin-bottom: 16px; }

  .section { margin-bottom: 14px; }
  label { display: block; font-size: 11px; color: #999; margin-bottom: 5px; font-weight: 500; }

  input[type="text"], input[type="url"], textarea {
    width: 100%;
    background: #2c2c2c;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  input:focus, textarea:focus { border-color: #4f8ef7; }
  textarea { resize: vertical; min-height: 80px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .tab {
    flex: 1; padding: 6px;
    background: #2c2c2c; border: 1px solid #3a3a3a; border-radius: 6px;
    color: #888; font-size: 11px; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .tab.active { background: #4f8ef7; border-color: #4f8ef7; color: #fff; font-weight: 600; }

  .row { display: flex; gap: 8px; }
  .row .section { flex: 1; }

  .checkbox-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; background: #2c2c2c; border: 1px solid #3a3a3a;
    border-radius: 6px; cursor: pointer; user-select: none;
  }
  .checkbox-row input { width: auto; }
  .checkbox-row span { font-size: 11px; color: #ccc; }

  .btn {
    width: 100%; padding: 10px; background: #4f8ef7;
    border: none; border-radius: 6px; color: #fff;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: opacity 0.15s; margin-top: 4px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.secondary { background: #2c2c2c; border: 1px solid #3a3a3a; color: #ccc; font-weight: 500; }

  /* Token type breakdown chips */
  .token-summary {
    display: flex; flex-wrap: wrap; gap: 5px;
    margin-top: 8px;
  }
  .chip {
    padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
    border: 1px solid transparent;
  }
  .chip-color    { background: rgba(99,179,237,0.12); border-color: rgba(99,179,237,0.3);  color: #63b3ed; }
  .chip-float    { background: rgba(154,230,180,0.12); border-color: rgba(154,230,180,0.3); color: #9ae6b4; }
  .chip-string   { background: rgba(251,211,141,0.12); border-color: rgba(251,211,141,0.3); color: #fbd38d; }
  .chip-shadow   { background: rgba(183,148,246,0.12); border-color: rgba(183,148,246,0.3); color: #b794f6; }
  .chip-skipped  { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);  color: #666; }

  #status {
    margin-top: 12px; padding: 10px; border-radius: 6px;
    font-size: 11px; line-height: 1.6; display: none;
    white-space: pre-line;
  }
  #status.info  { background: #1a2a3a; border: 1px solid #2a4a6a; color: #7ab3f5; display: block; }
  #status.ok    { background: #1a2e1a; border: 1px solid #2a5a2a; color: #6fcf6f; display: block; }
  #status.error { background: #2e1a1a; border: 1px solid #5a2a2a; color: #f07070; display: block; }

  .divider { height: 1px; background: #2c2c2c; margin: 14px 0; }
</style>
</head>
<body>

<h1>Design Token Sync</h1>
<p class="subtitle">Works with any project using the W3C design token format</p>

<!-- Source -->
<div class="section">
  <label>Token source</label>
  <div class="tabs">
    <button class="tab active" id="tab-url" onclick="switchTab('url')">URL</button>
    <button class="tab" id="tab-paste" onclick="switchTab('paste')">Paste JSON</button>
  </div>

  <div id="panel-url">
    <input type="url" id="url-input"
      placeholder="http://localhost:3000/api/tokens  or  raw GitHub URL"
      value="http://localhost:3000/api/tokens" />
    <div style="margin-top:6px; display:flex; gap:6px;">
      <button class="btn secondary" style="margin-top:0" onclick="fetchTokens()">Fetch</button>
    </div>
  </div>

  <div id="panel-paste" style="display:none">
    <textarea id="json-input" placeholder='Paste design-tokens.json content here…'></textarea>
  </div>

  <div class="token-summary" id="token-summary"></div>
</div>

<!-- Collection name -->
<div class="row">
  <div class="section">
    <label>Collection name</label>
    <input type="text" id="collection-name" value="Design Tokens" />
  </div>
  <div class="section">
    <label>Strip prefix (optional)</label>
    <input type="text" id="strip-prefix" placeholder="e.g. global" value="global" />
  </div>
</div>

<!-- Options -->
<div class="section">
  <label style="cursor:pointer" class="checkbox-row">
    <input type="checkbox" id="bind-nodes" checked />
    <span>Bind matching node fills &amp; strokes to color variables</span>
  </label>
</div>

<div class="divider"></div>

<button class="btn" id="run-btn" onclick="run()" disabled>Sync to Figma</button>

<div id="status"></div>

<script>
  let parsedTokens = null

  // ── Token type classification (mirrors plugin.js) ─────────────────────────
  const FLOAT_TYPES = new Set([
    'spacing', 'sizing', 'dimension', 'borderRadius', 'borderWidth',
    'fontSizes', 'lineHeights', 'fontWeights', 'letterSpacing',
    'paragraphSpacing', 'opacity', 'number', 'duration',
  ])
  const STRING_TYPES  = new Set(['fontFamilies', 'fontFamily'])
  const SHADOW_TYPES  = new Set(['boxShadow', 'shadow'])
  const SKIP_TYPES    = new Set(['typography', 'border', 'transition', 'gradient', 'cubicBezier'])

  function classify(type) {
    if (type === 'color')           return 'color'
    if (FLOAT_TYPES.has(type))     return 'float'
    if (STRING_TYPES.has(type))    return 'string'
    if (SHADOW_TYPES.has(type))    return 'shadow'
    return 'skip'
  }

  // ── UI helpers ────────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('tab-url').classList.toggle('active', tab === 'url')
    document.getElementById('tab-paste').classList.toggle('active', tab === 'paste')
    document.getElementById('panel-url').style.display   = tab === 'url'   ? '' : 'none'
    document.getElementById('panel-paste').style.display = tab === 'paste' ? '' : 'none'
  }

  function setStatus(msg, type = 'info') {
    const el = document.getElementById('status')
    el.textContent = msg
    el.className = type
  }

  function showSummary(tokens) {
    const counts = { color: 0, float: 0, string: 0, shadow: 0, skip: 0 }
    for (const [, t] of tokens) counts[classify(t.type)]++
    const el = document.getElementById('token-summary')
    el.innerHTML = ''
    const labels = {
      color:  ['COLOR vars',   'chip-color'],
      float:  ['FLOAT vars',   'chip-float'],
      string: ['STRING vars',  'chip-string'],
      shadow: ['Effect styles','chip-shadow'],
      skip:   ['Skipped',      'chip-skipped'],
    }
    for (const [key, [label, cls]] of Object.entries(labels)) {
      if (counts[key] === 0) continue
      const chip = document.createElement('span')
      chip.className = `chip ${cls}`
      chip.textContent = `${counts[key]} ${label}`
      el.appendChild(chip)
    }
  }

  // ── Token flattening ──────────────────────────────────────────────────────
  function flattenTokens(obj, stripPrefix) {
    const result = {}
    function walk(o, path) {
      for (const [key, val] of Object.entries(o)) {
        if (key.startsWith('$')) continue
        const name = path ? `${path}/${key}` : key
        if (val && typeof val === 'object' && '$value' in val) {
          let tokenName = name
          if (stripPrefix && tokenName.startsWith(stripPrefix + '/')) {
            tokenName = tokenName.slice(stripPrefix.length + 1)
          }
          result[tokenName] = {
            value: val.$value,
            type:  val.$type || inferType(val.$value),
            description: val.$description,
          }
        } else if (val && typeof val === 'object') {
          // inherit $type from group if present
          if (val.$type) {
            for (const [k2, v2] of Object.entries(val)) {
              if (k2.startsWith('$')) continue
              if (v2 && typeof v2 === 'object' && !('$value' in v2)) {
                walk({ [k2]: { ...v2, $type: v2.$type || val.$type } }, name)
              } else if (v2 && typeof v2 === 'object' && '$value' in v2) {
                const n = `${name}/${k2}`
                let tokenName = n
                if (stripPrefix && tokenName.startsWith(stripPrefix + '/')) {
                  tokenName = tokenName.slice(stripPrefix.length + 1)
                }
                result[tokenName] = {
                  value: v2.$value,
                  type:  v2.$type || val.$type,
                  description: v2.$description,
                }
              }
            }
          } else {
            walk(val, name)
          }
        }
      }
    }
    walk(obj, '')
    return result
  }

  function inferType(value) {
    if (typeof value === 'string' && /^#|^rgba?/i.test(value)) return 'color'
    return 'unknown'
  }

  function parseJSON(json) {
    const strip = document.getElementById('strip-prefix').value.trim()
    const flat  = flattenTokens(json, strip)
    return Object.entries(flat)
  }

  // ── Fetch ─────────────────────────────────────────────────────────────────
  async function fetchTokens() {
    const url = document.getElementById('url-input').value.trim()
    if (!url) return setStatus('Enter a URL first', 'error')
    setStatus(`Fetching ${url} …`, 'info')
    try {
      const res = await fetch(url)
      if (!res.ok) throw new Error(`HTTP ${res.status}`)
      const json = await res.json()
      parsedTokens = parseJSON(json)
      showSummary(parsedTokens)
      setStatus(`✓ ${parsedTokens.length} tokens loaded — ready to sync`, 'ok')
      document.getElementById('run-btn').disabled = false
    } catch (e) {
      setStatus(`Fetch failed: ${e.message}\n\nMake sure your dev server is running and has an /api/tokens endpoint.`, 'error')
    }
  }

  // ── Paste ─────────────────────────────────────────────────────────────────
  function loadPasted() {
    const raw = document.getElementById('json-input').value.trim()
    if (!raw) return
    try {
      const json = JSON.parse(raw)
      parsedTokens = parseJSON(json)
      showSummary(parsedTokens)
      setStatus(`✓ ${parsedTokens.length} tokens parsed — ready to sync`, 'ok')
      document.getElementById('run-btn').disabled = false
    } catch (e) {
      setStatus(`Invalid JSON: ${e.message}`, 'error')
    }
  }
  document.getElementById('json-input').addEventListener('input', loadPasted)

  // ── Run ───────────────────────────────────────────────────────────────────
  function run() {
    if (!parsedTokens || parsedTokens.length === 0) return setStatus('No tokens loaded', 'error')
    const collectionName = document.getElementById('collection-name').value.trim() || 'Design Tokens'
    const bindNodes = document.getElementById('bind-nodes').checked
    setStatus(`Syncing ${parsedTokens.length} tokens to "${collectionName}" …`, 'info')
    document.getElementById('run-btn').disabled = true
    parent.postMessage({
      pluginMessage: { type: 'sync', tokens: parsedTokens, collectionName, bindNodes }
    }, '*')
  }

  // ── Messages from plugin ──────────────────────────────────────────────────
  window.onmessage = (event) => {
    const msg = event.data.pluginMessage
    if (!msg) return
    if (msg.type === 'done') {
      const parts = [
        `${msg.created} variables created`,
        `${msg.updated} updated`,
        msg.stylesMade ? `${msg.stylesMade} shadow styles` : null,
        msg.bound      ? `${msg.bound} nodes bound` : null,
        msg.errors     ? `⚠️ ${msg.errors} errors (check Figma console)` : null,
      ].filter(Boolean)
      setStatus('✅ ' + parts.join(' · '), 'ok')
      document.getElementById('run-btn').disabled = false
    }
    if (msg.type === 'error') {
      setStatus(`❌ ${msg.message}`, 'error')
      document.getElementById('run-btn').disabled = false
    }
    if (msg.type === 'progress') {
      setStatus(msg.message, 'info')
    }
  }
</script>
</body>
</html>
